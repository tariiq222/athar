name: athar
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: athar
      POSTGRES_PASSWORD: athar
      POSTGRES_DB: athar
    ports: ["5442:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6389:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: athar
      MINIO_ROOT_PASSWORD: athar12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
volumes:
  pgdata:
  miniodata: